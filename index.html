<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Tải Video - Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input[type="text"] {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        button {
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            color: #d9534f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Downloader</h1>
        <p>Dán liên kết video của bạn vào bên dưới</p>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Ví dụ: https://www.tiktok.com/@user/video/123456789">
            <button onclick="processDownload()">Tải Xuống</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        function processDownload() {
            const urlInput = document.getElementById('videoUrl').value;
            const resultDiv = document.getElementById('result');

            if (!urlInput) {
                resultDiv.style.color = "#d9534f";
                resultDiv.innerText = "Vui lòng nhập một liên kết hợp lệ!";
                return;
            }

            // Hiển thị trạng thái đang xử lý
            resultDiv.style.color = "#007bff";
            resultDiv.innerText = "Đang xử lý liên kết... Vui lòng chờ.";

            /* * LƯU Ý QUAN TRỌNG:
             * Đây chỉ là giao diện Frontend. Để tải video thực sự, 
             * bạn cần gửi 'urlInput' này đến một Backend API.
             * Ví dụ:
             * fetch(`https://api.domain-cua-ban.com/download?url=${urlInput}`)
             * .then(response => response.json())
             * .then(data => { ... hiển thị link tải ... })
             */

            // Mô phỏng thời gian phản hồi từ server
            setTimeout(() => {
                resultDiv.style.color = "#28a745";
                resultDiv.innerHTML = "Hệ thống cần tích hợp API Backend để thực hiện chức năng này.";
            }, 1500);
        }
    </script>

</body>
</html>
