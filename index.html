<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Tải Video TikTok - No Watermark</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard-container {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #00f2fe;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            outline: none;
            transition: border 0.3s;
        }
        input[type="text"]:focus {
            border-color: #00f2fe;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            color: #888;
        }
        #result {
            display: none;
            margin-top: 20px;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }
        .video-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .video-info img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        .video-details p {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 5px;
        }
        .download-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-download {
            text-decoration: none;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
            display: block;
        }
        .btn-standard { background-color: #ff0050; }
        .btn-hd { background-color: #00f2fe; color: #121212; }
        .loading {
            text-align: center;
            color: #888;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h2>TikTok Downloader</h2>
    <div class="input-group">
        <input type="text" id="tiktokUrl" placeholder="Dán link video TikTok vào đây...">
        <button id="fetchBtn" onclick="getVideoData()">Lấy Video</button>
    </div>
    
    <div class="loading" id="loadingText">Đang xử lý dữ liệu...</div>

    <div id="result">
        <div class="video-info">
            <img id="videoCover" src="" alt="Cover">
            <div class="video-details">
                <p id="videoAuthor"><strong>Tác giả:</strong> </p>
                <p id="videoTitle"><strong>Tiêu đề:</strong> </p>
            </div>
        </div>
        <div class="download-buttons">
            <a id="btnStandard" href="#" target="_blank" class="btn-download btn-standard">Tải Chất Lượng Thường (No Logo)</a>
            <a id="btnHd" href="#" target="_blank" class="btn-download btn-hd">Tải Chất Lượng HD (No Logo)</a>
        </div>
    </div>
</div>

<script>
    async function getVideoData() {
        const urlInput = document.getElementById('tiktokUrl').value.trim();
        const fetchBtn = document.getElementById('fetchBtn');
        const loadingText = document.getElementById('loadingText');
        const resultDiv = document.getElementById('result');

        if (!urlInput) {
            alert('Vui lòng nhập liên kết TikTok!');
            return;
        }

        // Đặt trạng thái loading
        fetchBtn.disabled = true;
        loadingText.style.display = 'block';
        resultDiv.style.display = 'none';

        try {
            // Sử dụng API miễn phí từ TikWM
            const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`;
            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.code === 0) {
                const videoData = data.data;

                // Hiển thị thông tin video
                document.getElementById('videoCover').src = videoData.cover;
                document.getElementById('videoAuthor').innerHTML = `<strong>Tác giả:</strong> ${videoData.author.nickname}`;
                document.getElementById('videoTitle').innerHTML = `<strong>Tiêu đề:</strong> ${videoData.title.substring(0, 50)}...`;

                // Cập nhật link tải
                document.getElementById('btnStandard').href = videoData.play;
                
                // Kiểm tra xem có bản HD không
                const btnHd = document.getElementById('btnHd');
                if (videoData.hdplay) {
                    btnHd.href = videoData.hdplay;
                    btnHd.style.display = 'block';
                } else {
                    btnHd.style.display = 'none';
                }

                resultDiv.style.display = 'block';
            } else {
                alert('Không thể lấy video. Hãy kiểm tra lại liên kết!');
            }
        } catch (error) {
            console.error('Lỗi API:', error);
            alert('Có lỗi xảy ra trong quá trình kết nối API.');
        } finally {
            fetchBtn.disabled = false;
            loadingText.style.display = 'none';
        }
    }
</script>

</body>
</html>
